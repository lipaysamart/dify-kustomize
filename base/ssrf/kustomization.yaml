resources:
  - deployment.yaml
  - service.yaml
labels:
  - pairs:
      app.kubernetes.io/name: dify-ssrf
    includeSelectors: true
configMapGenerator:
  - name: ssrf-proxy-entrypoint
    files:
      - docker-entrypoint-mount.sh=docker-entrypoint-mount.sh
  - name: ssrf-proxy-config
    files:
      - squid.conf.template=squid.conf.template
generatorOptions:
  disableNameSuffixHash: true
