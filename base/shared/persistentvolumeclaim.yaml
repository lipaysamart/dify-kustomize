apiVersion: v1
kind: PersistentVolume
metadata:
  name: dify-api-storage
spec:
  capacity:
    storage: 20Gi
  volumeMode: Filesystem
  accessModes:
  - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  local:
    path: /mnt/data/dify
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dify-api-storage
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: local-storage
