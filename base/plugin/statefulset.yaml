---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dify-plugin-daemon
spec:
  replicas: 1
  serviceName: "dify-plugin-daemon"
  volumeClaimTemplates:
    - metadata:
        name: dify-plugin-daemon-storage
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
  template:
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:15-alpine
          command:
            - "sh"
            - "-c"
            - "until pg_isready -h dify-postgres -U postgres -d dify; do echo waiting for postgres; sleep 2; done;"
      containers:
        - name: dify-plugin-daemon
          image: langgenius/dify-plugin-daemon:0.5.4-local
          resources:
            limits:
              memory: "1024Mi"
              cpu: 1
            requests:
              memory: "256Mi"
              cpu: "100m"
          ports:
            - containerPort: 5003
              protocol: TCP
              name: debug-port

            - containerPort: 5002
              protocol: TCP
              name: service-port
          envFrom:
            - configMapRef:
                name: dify-shared-config
            - secretRef:
                name: dify-shared-secret
          env:
            - name: CELERY_BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: dify-shared-secret
                  key: CELERY_BROKER_URL
            - name: "DB_DATABASE"
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: DB_PLUGIN_DATABASE
            - name: "SERVER_PORT"
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: PLUGIN_DAEMON_PORT
            - name: "SERVER_KEY"
              valueFrom:
                secretKeyRef:
                  name: dify-shared-secret
                  key: PLUGIN_DAEMON_KEY
            - name: "MAX_PLUGIN_PACKAGE_SIZE"
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: PLUGIN_MAX_PACKAGE_SIZE
            - name: "PPROF_ENABLED"
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: PLUGIN_PPROF_ENABLED
            - name: "DIFY_INNER_API_URL"
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: PLUGIN_DIFY_INNER_API_URL
            - name: "DIFY_INNER_API_KEY"
              valueFrom:
                secretKeyRef:
                  name: dify-shared-secret
                  key: PLUGIN_DIFY_INNER_API_KEY
            - name: "PLUGIN_REMOTE_INSTALLING_HOST"
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: PLUGIN_DEBUGGING_HOST
            - name: "PLUGIN_REMOTE_INSTALLING_PORT"
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: PLUGIN_DEBUGGING_PORT
            - name: "PLUGIN_WORKING_PATH"
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: PLUGIN_WORKING_PATH
            - name: "FORCE_VERIFYING_SIGNATURE"
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: FORCE_VERIFYING_SIGNATURE
            - name: "PYTHON_ENV_INIT_TIMEOUT"
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: PLUGIN_PYTHON_ENV_INIT_TIMEOUT
            - name: "PLUGIN_MAX_EXECUTION_TIMEOUT"
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: PLUGIN_MAX_EXECUTION_TIMEOUT
            - name: "PIP_MIRROR_URL"
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: PIP_MIRROR_URL
          volumeMounts:
            - name: dify-plugin-daemon-storage
              mountPath: /app/storage
